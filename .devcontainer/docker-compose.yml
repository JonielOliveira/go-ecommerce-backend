name: ${COMPOSE_PROJECT_NAME:-backend-dev}

volumes:
  postgres-data:

services:
  app:
    container_name: ${APP_CONTAINER_NAME:-app-dev}
    build: 
      context: .
      dockerfile: Dockerfile
    working_dir: ${WORKSPACE_FOLDER:-/workspaces/app}
    ports:
      - "${APP_EXTERNAL_PORT:-8080}:${APP_INTERNAL_PORT:-8080}"
    environment:
      # NOTE: POSTGRES_DB/USER/PASSWORD should match values in db container
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOSTNAME: db

    volumes:
      - ..:${WORKSPACE_FOLDER:-/workspaces/app}:cached
      
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Use proper Docker networking instead of network_mode: service:db
    # to ensure reliable DNS resolution in all environments
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally. 
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-db}
    image: postgres:${POSTGRES_TAG:-18}
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:${POSTGRES_INTERNAL_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: ${POSTGRES_HEALTH_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTH_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTH_RETRIES:-5}
      start_period: ${POSTGRES_HEALTH_START_PERIOD:-30s}
    volumes:
      - postgres-data:${POSTGRES_DATA_DIR:-/var/lib/postgresql}
    environment:
      # NOTE: POSTGRES_DB/USER/PASSWORD should match values in app container
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD:-postgres}

    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

networks:
  app-network:
    driver: ${APP_NETWORK_DRIVER:-bridge}
